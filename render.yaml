services:
  - type: web
    name: baithak-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: TRUST_PROXY
        value: true
